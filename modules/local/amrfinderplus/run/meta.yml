name: amrfinderplus_run
description: Identify antimicrobial resistance in gene or protein sequences using nucleotide FASTA, protein FASTA, and GFF3 inputs
keywords:
  - bacteria
  - fasta
  - antibiotic resistance
  - annotation
tools:
  - amrfinderplus:
      description: AMRFinderPlus finds antimicrobial resistance and other genes in protein
        or nucleotide sequences.
      homepage: https://github.com/ncbi/amr/wiki
      documentation: https://github.com/ncbi/amr/wiki
      tool_dev_url: https://github.com/ncbi/amr
      doi: "10.1038/s41598-021-91456-0"
      licence: ["Public Domain"]
      identifier: biotools:amrfinderplus
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta_nuc:
        type: file
        description: Nucleotide sequences in FASTA format
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
    - fasta_prot:
        type: file
        description: Protein sequences in FASTA format
        pattern: "*.{fasta,fasta.gz,fa,fa.gz,faa,faa.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1929"
    - gff3:
        type: file
        description: Annotation in GFF3 format
        pattern: "*.{gff,gff3,gff.gz,gff3.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1975"
    - species:
        type: string
        description: Organism name for organism-specific analysis (optional, can be null)
        pattern: ".*"
  - amrfinderdb:
      type: directory
      description: AMRFinderPlus database directory (unpacked)
      pattern: "*"
output:
  report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}.tsv:
          type: file
          description: AMRFinder+ final report
          pattern: "*.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  mutation_report:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - ${prefix}-mutations.tsv:
          type: file
          description: Report of organism-specific point-mutations
          pattern: "*-mutations.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: "http://edamontology.org/format_3750"
  tool_version:
    - VER:
        type: string
        description: The version of the tool in string format (useful for downstream
          tools such as hAMRronization)
  db_version:
    - DBVER:
        type: string
        description: The version of the used database in string format (useful for downstream
          tools such as hAMRronization)
authors:
  - "@rpetit3"
  - "@louperelo"
  - "@jfy133"
maintainers:
  - "@rpetit3"
  - "@louperelo"
  - "@jfy133"
