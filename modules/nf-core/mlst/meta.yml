name: mlst
description: Run Torsten Seemann's classic MLST on a genome assembly
keywords:
  - mlst
  - typing
  - bacteria
  - assembly
tools:
  - mlst:
      description: Scan contig files against PubMLST typing schemes
      homepage: https://github.com/tseemann/mlst
      licence: ["GPL v2"]
      identifier: biotools:mlst
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - fasta:
        type: file
        description: Assembly fasta file
        pattern: "*.{fasta,fa,fna}"
        ontologies: []
  - - blastdb:
        type: directory
        description: |
          Optional alternative BLAST database directory containing
          `mlst.fa` and its BLAST index sibling files (`mlst.fa.n*`).
          The module appends `/mlst.fa` when building `mlst --blastdb`.
          Passing the `.fa` file directly would leave the index files
          unstaged. Pass `[]` to use the default database bundled with mlst.
        ontologies: []
  - - datadir:
        type: directory
        description: |
          Optional alternative PubMLST data directory to use instead of the
          one bundled with mlst. Forwarded to `mlst --datadir`. Pass `[]` to
          use the default directory.
output:
  tsv:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. [ id:'test', single_end:false ]
      - "*.tsv":
          type: file
          description: MLST calls in tsv format
          pattern: "*.{tsv}"
          ontologies:
            - edam: http://edamontology.org/format_3475 # TSV
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@lskatz"
  - "@tseemann"
maintainers:
  - "@lskatz"
  - "@tseemann"
